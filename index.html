<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎页</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #637083;
      --line: rgba(23, 32, 42, 0.12);
      --accent: #0f766e;
      --accent-strong: #115e59;
      --paper: rgba(255, 255, 255, 0.86);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(240, 253, 250, 0.94), rgba(255, 247, 237, 0.92)),
        url("https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1800&q=80") center/cover fixed;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: white;
      background: var(--accent);
      box-shadow: 0 10px 24px rgba(15, 118, 110, 0.24);
    }

    nav {
      display: flex;
      gap: 18px;
      color: var(--muted);
      font-size: 15px;
    }

    nav a {
      color: inherit;
      text-decoration: none;
    }

    nav a:hover {
      color: var(--accent-strong);
    }

    main {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      display: grid;
      align-items: center;
      padding: 34px 0 56px;
    }

    .hero {
      max-width: 720px;
      padding: clamp(28px, 5vw, 56px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 70px rgba(23, 32, 42, 0.14);
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--accent-strong);
      font-size: 15px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      max-width: 680px;
      font-size: clamp(42px, 7vw, 78px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .lead {
      margin: 24px 0 0;
      max-width: 590px;
      color: var(--muted);
      font-size: clamp(17px, 2vw, 21px);
      line-height: 1.75;
    }

    .actions {
      margin-top: 34px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .button {
      min-height: 46px;
      padding: 0 22px;
      border: 1px solid transparent;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      background: var(--accent);
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      background: var(--accent-strong);
      box-shadow: 0 14px 28px rgba(15, 118, 110, 0.22);
    }

    .button.secondary {
      color: var(--ink);
      background: white;
      border-color: var(--line);
    }

    .button.secondary:hover {
      background: #f8fafc;
      box-shadow: 0 14px 28px rgba(23, 32, 42, 0.1);
    }

    footer {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 24px 0;
      color: rgba(23, 32, 42, 0.62);
      font-size: 14px;
    }

    @media (max-width: 640px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      nav {
        width: 100%;
        justify-content: space-between;
      }

      .hero {
        padding: 26px;
      }

      .actions,
      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="brand">
        <span class="brand-mark">W</span>
        <span>欢迎空间</span>
      </div>
      <nav aria-label="主导航">
        <a href="#">首页</a>
        <a href="#">关于</a>
        <a href="#">联系</a>
        <a href="https://www.ustc.edu.cn/" target="_blank" rel="noopener noreferrer">USTC 官网</a>
      </nav>
    </header>

    <main>
      <section class="hero" aria-labelledby="welcome-title">
        <p class="eyebrow">欢迎来到你的新网页</p>
        <h1 id="welcome-title">很高兴在这里遇见你</h1>
        <p class="lead">
          这是一个简洁、响应式的欢迎页。你可以继续在这里添加个人介绍、项目展示、产品入口，或访问中国科学技术大学官网了解更多信息。
        </p>
        <div class="actions">
          <a class="button" href="https://www.ustc.edu.cn/" target="_blank" rel="noopener noreferrer">访问 USTC 官网</a>
          <a class="button secondary" href="#">了解更多</a>
        </div>
      </section>
    </main>

    <footer>
      © 2026 欢迎空间。保留所有权利。
    </footer>
  </div>
</body>
</html>
